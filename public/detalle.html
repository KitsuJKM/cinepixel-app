<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CinePixel - Selección de Asientos</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .layout-detalle { display: grid; grid-template-columns: 350px 1fr; gap: 30px; padding: 20px 50px; }
        .panel-resumen { background: #e0e0e0; border-radius: 10px; padding: 30px; color: #0f0f12; height: fit-content; position: sticky; top: 100px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .resumen-header { text-align: center; border-bottom: 2px solid #ccc; padding-bottom: 15px; margin-bottom: 20px; }
        .resumen-header h2 { font-family: 'Playfair Display', serif; letter-spacing: 2px; margin: 0; }
        .item-precio { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.9rem; }
        .total-box { border-top: 2px solid #333; margin-top: 20px; padding-top: 20px; display: flex; justify-content: space-between; font-weight: bold; font-size: 1.4rem; }
        
        .mapa-sala { background: rgba(15, 15, 18, 0.8); border-radius: 10px; padding: 40px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .pantalla { width: 80%; height: 50px; background: linear-gradient(to bottom, #fff, #444); margin: 0 auto 50px auto; border-radius: 0 0 50% 50%; box-shadow: 0 20px 40px rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; color: black; font-weight: bold; letter-spacing: 10px; font-size: 0.8rem; }
        
        .grid-asientos { display: inline-grid; gap: 10px; margin-bottom: 40px; }
        .fila-nombre { color: var(--accent-gold); font-weight: bold; display: flex; align-items: center; justify-content: center; }
        
        /* ESTILOS DE ASIENTOS */
        .asiento { width: 30px; height: 30px; border-radius: 5px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; transition: all 0.2s; border: 1px solid rgba(255,255,255,0.1); font-weight: bold; }
        .asiento.disponible { background: #28a745; color: black; }
        .asiento.vip { border: 2px solid #e5c07b; background: transparent; color: #e5c07b; }
        .asiento.escogida { background: #e5c07b !important; color: black !important; transform: scale(1.2); box-shadow: 0 0 15px #e5c07b; border: none; }
        .asiento.ocupada { background: #dc3545 !important; cursor: not-allowed; color: white; border: none; }
        
        .leyenda { display: flex; justify-content: center; gap: 20px; font-size: 0.8rem; margin-top: 20px; }
        .leyenda-item { display: flex; align-items: center; gap: 8px; }
        .leyenda-box { width: 15px; height: 15px; border-radius: 3px; }

        /* MODAL DEL QR */
        #modal-tiquete { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; backdrop-filter: blur(10px); }
        .tiquete-digital { background: white; color: black; padding: 40px; border-radius: 15px; text-align: center; width: 100%; max-width: 400px; box-shadow: 0 0 50px rgba(255,255,255,0.2); }
        .custom-alert-box { background: rgba(20, 20, 25, 0.95); padding: 30px; border-radius: 10px; border: 1px solid #e5c07b; text-align: center; max-width: 320px; box-shadow: 0 0 30px rgba(229, 192, 123, 0.2); margin: auto; }
        .custom-alert-title { color: #e5c07b; margin-top: 0; font-family: 'Playfair Display', serif; font-size: 1.5rem; }
        .custom-alert-text { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 25px; line-height: 1.5; }
    </style>
</head>
<body>
    <header class="header-cine">
        <div class="logo-container" onclick="window.location.href='index.html'" style="cursor:pointer">
            <div style="background: white; color: black; border-radius: 50%; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; font-weight: bold;">P</div>
            CinePixel
        </div>
        <div class="header-controls">
            <button class="btn-glow">BARRANQUILLA 📍</button>
            <button class="btn-glow" id="nombre-usuario">CARGANDO... 👤</button>
        </div>
    </header>

    <div class="layout-detalle">
        <aside class="panel-resumen">
            <div class="resumen-header">
                <h2>RESUMEN DE SELECCIÓN</h2>
            </div>
            <p><strong>Película Seleccionada</strong><br><span id="resumen-peli">Cargando...</span><br><span id="resumen-hora">Hoy - 06:10 p.m.</span></p>
            <hr style="border:0; border-top:1px solid #999; margin:20px 0;">
            <p style="font-size:0.7rem; color:#666; letter-spacing:1px; margin-bottom:15px;">SILLAS Y PRECIOS</p>
            
            <div class="item-precio"><span>Standard (<span id="count-std">0</span>) x $20k</span><span id="price-std">$ 0</span></div>
            <div class="item-precio" style="color: #b8860b;"><span>VIP (<span id="count-vip">0</span>) x $30k</span><span id="price-vip">$ 0</span></div>
            
            <div class="total-box"><span>Total:</span><span id="resumen-total">$ 0</span></div>
            
            <button id="btn-comprar" class="btn-continuar" style="margin-top:30px; background:black; color:white; font-weight:bold; width: 100%;">CONFIRMAR SILLAS</button>
        </aside>

        <section class="mapa-sala">
            <div class="pantalla">P A N T A L L A</div>
            
            <div id="grid-asientos" class="grid-asientos"></div>
            
            <div class="leyenda">
                <div class="leyenda-item"><div class="leyenda-box" style="background: #28a745;"></div> Disponible</div>
                <div class="leyenda-item"><div class="leyenda-box" style="border: 1px solid #e5c07b;"></div> VIP</div>
                <div class="leyenda-item"><div class="leyenda-box" style="background: #dc3545;"></div> Ocupada</div>
                <div class="leyenda-item"><div class="leyenda-box" style="background: #e5c07b;"></div> Escogida</div>
            </div>
        </section>
    </div>

    <div id="modal-tiquete">
        <div class="tiquete-digital">
            <h2 style="font-family: serif; margin-bottom: 5px;">¡COMPRA EXITOSA!</h2>
            <p style="font-size: 0.8rem; color: #666; margin-bottom: 20px;">Presenta este código en la entrada</p>
            <div style="background: #f0f0f0; padding: 20px; border-radius: 10px; margin-bottom: 20px;">
                <img id="qr-imagen" src="" alt="QR" style="width: 200px; height: 200px; display: block; margin: 0 auto;">
                <p id="codigo-reserva" style="font-weight: bold; margin-top: 15px; letter-spacing: 2px; text-transform: uppercase; word-break: break-all;"></p>
            </div>
            <button class="btn-continuar" style="background: black; color: white;" onclick="window.location.href='index.html'">VOLVER A CARTELERA</button>
        </div>
    </div>

    <div class="modal-overlay" id="custom-alert-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; justify-content: center; align-items: center; backdrop-filter: blur(5px);">
        <div class="custom-alert-box">
            <h3 id="alert-title" class="custom-alert-title">Aviso</h3>
            <p id="alert-message" class="custom-alert-text"></p>
            <button id="btn-alert-ok" class="btn-continuar">ACEPTAR</button>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const pelicula_id = params.get('id');
        const usuarioLogueado = JSON.parse(localStorage.getItem('cinepixel_user'));
        let sillasSeleccionadas = new Set();

        // Función de alertas
        window.mostrarAlerta = (mensaje, titulo = "CinePixel") => { 
            return new Promise((resolve) => { 
                document.getElementById('alert-title').innerText = titulo; 
                document.getElementById('alert-message').innerText = mensaje; 
                document.getElementById('custom-alert-modal').style.display = 'flex'; 
                document.getElementById('btn-alert-ok').onclick = () => { 
                    document.getElementById('custom-alert-modal').style.display = 'none'; 
                    resolve(); 
                }; 
            }); 
        };

        document.addEventListener("DOMContentLoaded", async () => {
            // Verificar sesión
            if(!usuarioLogueado) { window.location.href = 'index.html'; return; }
            document.getElementById('nombre-usuario').innerText = `${usuarioLogueado.nombre.toUpperCase()} 👤`;

            // Cargar título de película
            try {
                const resPeli = await fetch(`/peliculas/${pelicula_id}`);
                const peli = await resPeli.json();
                document.getElementById('resumen-peli').innerText = peli.titulo;
            } catch (e) { console.error("Error cargando película", e); }

            // Generar cuadrícula de asientos
            const grid = document.getElementById('grid-asientos');
            grid.style.gridTemplateColumns = `40px repeat(15, 30px)`;
            
            // Obtener ocupados de la BD
            try {
                const resOcupados = await fetch(`/tiquetes/ocupados?peli_id=${pelicula_id}`);
                const ocupados = await resOcupados.json();

                const filas = ['A','B','C','D','E','F','G','H','I','J'];
                for(let f of filas) {
                    const label = document.createElement('div');
                    label.className = 'fila-nombre';
                    label.innerText = f;
                    grid.appendChild(label);

                    for(let n=1; n<=15; n++) {
                        const silla = document.createElement('div');
                        const idSilla = `${f}${n}`;
                        
                        // LÓGICA VIP (Filas I y J)
                        const esVip = (f === 'I' || f === 'J');
                        const estaOcupada = ocupados.includes(idSilla);

                        silla.className = `asiento ${estaOcupada ? 'ocupada' : 'disponible'} ${esVip ? 'vip' : ''}`;
                        silla.innerText = n;
                        
                        if(!estaOcupada) {
                            silla.onclick = () => {
                                if(sillasSeleccionadas.has(idSilla)) {
                                    sillasSeleccionadas.delete(idSilla);
                                    silla.classList.remove('escogida');
                                } else {
                                    sillasSeleccionadas.add(idSilla);
                                    silla.classList.add('escogida');
                                }
                                actualizarResumen();
                            };
                        }
                        grid.appendChild(silla);
                    }
                }
            } catch (error) {
                await mostrarAlerta("Error al cargar los asientos de la sala.");
            }
        });

        // LÓGICA DE PRECIOS
        function actualizarResumen() {
            let stdCount = 0;
            let vipCount = 0;

            sillasSeleccionadas.forEach(s => {
                if(s.startsWith('I') || s.startsWith('J')) {
                    vipCount++;
                } else {
                    stdCount++;
                }
            });

            const total = (stdCount * 20000) + (vipCount * 30000);
            
            document.getElementById('count-std').innerText = stdCount;
            document.getElementById('count-vip').innerText = vipCount;
            document.getElementById('price-std').innerText = `$ ${(stdCount * 20000).toLocaleString()}`;
            document.getElementById('price-vip').innerText = `$ ${(vipCount * 30000).toLocaleString()}`;
            document.getElementById('resumen-total').innerText = `$ ${total.toLocaleString()}`;
        }

        // COMPRA DE TIQUETES
        document.getElementById('btn-comprar').addEventListener('click', async () => {
            if(sillasSeleccionadas.size === 0) { 
                await mostrarAlerta("Por favor, selecciona al menos un asiento."); 
                return; 
            }
            
            const btn = document.getElementById('btn-comprar');
            btn.innerText = 'PROCESANDO PAGO... ⏳';
            btn.disabled = true;

            try {
                const response = await fetch('/tiquetes', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        pelicula_id: pelicula_id,
                        asientos: Array.from(sillasSeleccionadas),
                        usuario_id: usuarioLogueado.id
                    })
                });

                const data = await response.json();

                if(response.ok) {
                    // COMPRA EXITOSA: MOSTRAR QR
                    document.getElementById('qr-imagen').src = data.qr_image;
                    document.getElementById('codigo-reserva').innerText = data.codigo;
                    document.getElementById('modal-tiquete').style.display = 'flex';
                } else {
                    await mostrarAlerta(data.error || "Error al procesar la compra.", "Error");
                    btn.innerText = 'CONFIRMAR SILLAS';
                    btn.disabled = false;
                }
            } catch (error) {
                await mostrarAlerta("Error de conexión con el servidor.", "Fallo de Red");
                btn.innerText = 'CONFIRMAR SILLAS';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
